name: Trivy Security Scan

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Уязвимости зависимостей (npm + NuGet lock-файлы), секреты, мисконфиги
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: frontend/awake-web/node_modules

      # Dockerfile-образ API: CVE базового образа и системных пакетов
      - name: Build API image
        run: docker build -t awake-api:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: awake-api:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
